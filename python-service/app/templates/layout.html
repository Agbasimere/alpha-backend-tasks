<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg-color: #f9fafb;
        --text-color: #111827;
        --muted-color: #6b7280;
        --accent-color: #1d4ed8;
        --border-color: #e5e7eb;
        --card-bg: #ffffff;
      }

      body {
        margin: 0;
        padding: 2rem;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
      }

      .container {
        max-width: 960px;
        margin: 0 auto;
        background-color: var(--card-bg);
        border-radius: 0.75rem;
        padding: 2rem 2.5rem;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        border: 1px solid var(--border-color);
      }

      header {
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 1.5rem;
        margin-bottom: 1.5rem;
      }

      h1 {
        font-size: 1.75rem;
        margin: 0 0 0.25rem 0;
      }

      .subtitle {
        font-size: 0.9rem;
        color: var(--muted-color);
      }

      main section {
        margin-bottom: 1.5rem;
      }

      h2 {
        font-size: 1.1rem;
        margin-bottom: 0.75rem;
        color: var(--accent-color);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem 2rem;
      }

      .meta-label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted-color);
        margin-bottom: 0.25rem;
      }

      .meta-value {
        font-weight: 500;
      }

      ul {
        padding-left: 1.1rem;
        margin: 0.25rem 0;
      }

      li {
        margin-bottom: 0.25rem;
      }

      .metrics-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95rem;
      }

      .metrics-table th,
      .metrics-table td {
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid var(--border-color);
        text-align: left;
      }

      .metrics-table th {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted-color);
      }

      footer {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: var(--muted-color);
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div class="container">
      {% block content %}{% endblock %}
      <footer>
        Generated at:
        <time datetime="{{ generated_at|e }}">{{ generated_at|e }}</time>
      </footer>
    </div>
  </body>
</html>
